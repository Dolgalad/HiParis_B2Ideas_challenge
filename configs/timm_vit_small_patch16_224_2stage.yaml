seed: 2026

data:
  data_dir: /data1/schulz/hiparis/data
  image_size: 224
  batch_size: 64
  num_workers: 2

model:
  name: deit
  timm_model_name: deit_small_patch16_224
  pretrained: true
  dropout: 0.5
  freeze_backbone: true

  prediction_head:
    type: mlp
    hidden_dim: 512
    num_hidden_layers: 2
    dropout: 0.5
    use_layer_norm: false
    activation: gelu

training:
  weight_decay: 0.00001
  device: auto
  output_dir: checkpoints/deit_small_patch16_224_2stage
  save_best_metric: map
  save_best_metric_sense: max
  log_every_n_steps: 20
  use_pos_weight: true
  max_pos_weight: 10.0

  classifier_patterns:
    - classifier
    - head
    - fc

  stages:
    - name: head_only
      epochs: 40
      freeze_backbone: true
      lr: 0.0001
      scheduler: cosine
      min_lr: 0.000001

    - name: finetune
      epochs: 20
      freeze_backbone: false
      lr: 0.00001
      classifier_lr: 0.0001
      scheduler: cosine
      min_lr: 0.000001
