seed: 2026

data:
  data_dir: data
  image_size: 384
  batch_size: 8
  num_workers: 4

model:
  name: clip
  clip_model_name: ViT-B-32
  clip_pretrained: openai
  freeze_backbone: false
  dropout: 0.2

training:
  epochs: 10
  lr: 0.00001
  classifier_lr: 0.0001
  weight_decay: 0.00001
  device: auto
  output_dir: checkpoints/clip_vit_b32
  save_best_metric: val_loss
