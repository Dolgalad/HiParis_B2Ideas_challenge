seed: 2026

data:
  data_dir: /data1/schulz/hiparis/data
  image_size: 224
  batch_size: 64
  num_workers: 2

model:
  name: resnet50
  pretrained: true
  dropout: 0.2

training:
  epochs: 20
  lr: 0.0001
  weight_decay: 0.00001
  device: auto
  output_dir: checkpoints/resnet50
  save_best_metric: map
  save_best_metric_sense: max
  scheduler: cosine
  min_lr: 0.000001
  log_every_n_steps: 20
